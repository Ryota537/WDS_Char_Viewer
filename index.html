<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png"
    href="https://world-dai-star.com/MeNeEcJP/wp-content/themes/wds/assets/images/favicon/icon-192x192.png">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>WDS Spine Viewer</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      background-color: #000;
    }

    #WDS {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-family: sans-serif;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 250px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    #control-panel h3 {
      margin-bottom: 5px;
      font-size: 18px;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .control-group label {
      font-size: 13px;
      color: #ddd;
    }

    .control-group select, 
    .control-group input, 
    .control-group button {
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #fff;
      font-size: 14px;
    }

    .control-group select:focus, 
    .control-group input:focus {
      outline: none;
      border-color: #00ff00;
    }

    .control-group button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 5px;
      transition: background 0.2s;
    }

    .control-group button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>
  <div id="control-panel">
    <h3>WDS Spine Controls</h3>
    <div class="control-group">
      <label for="spine-id">Character / Spine ID</label>
      <input type="number" id="spine-id" value="10101">
      <button id="load-spine">Load Character</button>
    </div>
    <div class="control-group">
      <label for="expression-select">Facial Expression</label>
      <select id="expression-select">
        <option value="">-- Select Expression --</option>
      </select>
    </div>
    <div class="control-group">
      <label for="motion-select">Body Motion</label>
      <select id="motion-select">
        <option value="">-- Select Motion --</option>
      </select>
    </div>
  </div>

  <script type="module" src="/src/index.ts"></script>
</body>

</html>
